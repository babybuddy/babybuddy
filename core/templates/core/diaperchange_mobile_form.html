{% extends 'mobile-base.html' %}
{% load datetime i18n %}

{% block page %}
     <form role="form" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            {{ field.widget }}
            <div class="row">
                {% include 'babybuddy/form_field.html' %}
            </div>
        {% endfor %}
        <button type="submit" class="submit-primary btn btn-primary btn-lg">{% trans "Submit" %}</button>
    </form> 
{% endblock %}
